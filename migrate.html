<script>
function getCfg() {
 var raw = document.getElementById('ms').textContent;
 var cfg = {};
 raw.trim().split('\n').forEach(function(line) {
   var eq = line.indexOf('=');
   if (eq > 0) cfg[line.slice(0,eq).trim()] = line.slice(eq+1).trim();
 });
 return cfg;
}

var running = false;
var stats = {done:0,skip:0,err:0,total:0};
var SU = ‘https://fyqcokjvdhzbsdnsnxdi.supabase.co’;
var BK = ‘wardrobe-photos’;

function addLog(msg, cls) {
var el = document.getElementById(‘lg’);
var d = document.createElement(‘div’);
d.className = ’ll ’ + (cls||‘in’);
d.textContent = ‘[’ + new Date().toLocaleTimeString() + ’] ’ + msg;
el.appendChild(d);
el.scrollTop = el.scrollHeight;
}

function setP(n, t) {
var p = t ? Math.round(n/t*100) : 0;
document.getElementById(‘bf’).style.width = p + ‘%’;
document.getElementById(‘pt’).textContent = n + ’ of ’ + t + ’ (’ + p + ‘%)’;
}

function norm(s) { return s.toLowerCase().trim().replace(/\s+/g,’ ’); }

async function fetchAT(cfg) {
var recs = [], off = null;
do {
var url = ‘https://api.airtable.com/v0/’ + cfg.AB + ‘/’ + cfg.AT2 + ‘?pageSize=100’;
if (off) url += ‘&offset=’ + off;
var r = await fetch(url, {headers: {‘Authorization’: ’Bearer ’ + cfg.AT}});
if (!r.ok) throw new Error(’Airtable ’ + r.status);
var d = await r.json();
recs = recs.concat(d.records);
off = d.offset;
addLog(‘Fetched ’ + recs.length + ’ Airtable records…’);
} while (off);
return recs;
}

async function fetchSB(cfg) {
var r = await fetch(SU + ‘/rest/v1/items?select=id,name,image_url&limit=1000’, {
headers: {‘apikey’: cfg.SK, ‘Authorization’: ’Bearer ’ + cfg.SK}
});
if (!r.ok) throw new Error(’Supabase ’ + r.status);
return await r.json();
}

async function uploadPhoto(cfg, fname, blob) {
var path = ‘photos/’ + fname;
var r = await fetch(SU + ‘/storage/v1/object/’ + BK + ‘/’ + path, {
method: ‘POST’,
headers: {‘apikey’: cfg.SK, ‘Authorization’: ’Bearer ’ + cfg.SK, ‘Content-Type’: blob.type||‘image/jpeg’, ‘x-upsert’: ‘true’},
body: blob
});
if (!r.ok) { var e = await r.text(); throw new Error(’Upload: ’ + e); }
return SU + ‘/storage/v1/object/public/’ + BK + ‘/’ + path;
}

async function updateRow(cfg, id, url) {
var r = await fetch(SU + ‘/rest/v1/items?id=eq.’ + id, {
method: ‘PATCH’,
headers: {‘apikey’: cfg.SK, ‘Authorization’: ’Bearer ’ + cfg.SK, ‘Content-Type’: ‘application/json’, ‘Prefer’: ‘return=minimal’},
body: JSON.stringify({image_url: url})
});
if (!r.ok) throw new Error(’DB ’ + r.status);
}

async function startIt() {
var cfg = getCfg();
running = true;
stats = {done:0,skip:0,err:0,total:0};
document.getElementById(‘sb’).style.display = ‘none’;
document.getElementById(‘xb’).style.display = ‘block’;
document.getElementById(‘pw’).style.display = ‘block’;
document.getElementById(‘db’).style.display = ‘none’;
document.getElementById(‘lg’).innerHTML = ‘’;

try {
addLog(‘Reading config…’);
addLog(‘Fetching Airtable records…’);
var atRecs = await fetchAT(cfg);
addLog(‘Got ’ + atRecs.length + ’ Airtable records’, ‘ok’);

```
addLog('Fetching Supabase items...');
var sbItems = await fetchSB(cfg);
addLog('Got ' + sbItems.length + ' Supabase items', 'ok');

var map = {};
sbItems.forEach(function(i) { map[norm(i.name)] = i; });

var withPics = atRecs.filter(function(r) { return r.fields.Picture && r.fields.Picture.length > 0; });
addLog(withPics.length + ' records have photos');
stats.total = withPics.length;
setP(0, stats.total);

for (var i = 0; i < withPics.length; i++) {
 if (!running) { addLog('Stopped.', 'wn'); break; }
 var rec = withPics[i];
 var name = rec.fields.Name || '';
 var pic = rec.fields.Picture[0];
 var sbItem = map[norm(name)];

 if (!sbItem) {
   addLog('No match: "' + name + '"', 'wn');
   stats.skip++;
   setP(i+1, stats.total);
   continue;
 }

 try {
   var ir = await fetch(pic.url);
   if (!ir.ok) throw new Error('Download ' + ir.status);
   var blob = await ir.blob();
   var ext = (pic.filename || 'photo.jpg').split('.').pop();
   var safe = name.replace(/[^a-zA-Z0-9]/g, '_').toLowerCase();
   var fname = safe + '_' + sbItem.id.slice(0,8) + '.' + ext;
   var pubUrl = await uploadPhoto(cfg, fname, blob);
   await updateRow(cfg, sbItem.id, pubUrl);
   addLog('OK: ' + name, 'ok');
   stats.done++;
 } catch(e) {
   addLog('ERR ' + name + ': ' + e.message, 'er');
   stats.err++;
 }

 setP(i+1, stats.total);
 await new Promise(function(r) { setTimeout(r, 150); });
}

document.getElementById('db').style.display = 'block';
document.getElementById('ds').textContent = stats.done + ' migrated, ' + stats.skip + ' skipped, ' + stats.err + ' errors';
addLog('Done: ' + stats.done + ' migrated');
```

} catch(e) {
addLog(’FATAL: ’ + e.message, ‘er’);
console.error(e);
}

running = false;
document.getElementById(‘sb’).style.display = ‘block’;
document.getElementById(‘sb’).textContent = ‘Run Again’;
document.getElementById(‘xb’).style.display = ‘none’;
}

function stopIt() { running = false; }
</script>
