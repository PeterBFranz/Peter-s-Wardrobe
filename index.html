* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F8F9FB; color: #111; min-height: 100vh; }
.header { background: #fff; border-bottom: 1px solid #E5E7EB; padding: 0 16px; position: sticky; top: 0; z-index: 100; }
.header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; gap: 10px; }
.header-left { display: flex; align-items: center; gap: 8px; }
.logo { font-size: 20px; font-weight: 700; color: #111; letter-spacing: -0.5px; cursor: pointer; user-select: none; }
.count-badge { background: #EEF2FF; color: #4F46E5; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
.search-input { padding: 7px 12px; border-radius: 20px; border: 1px solid #E5E7EB; font-size: 13px; width: 180px; outline: none; background: #F9FAFB; }
.add-btn { background: #6366F1; color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.sync-btn { background: #F3F4F6; color: #374151; border: none; border-radius: 8px; padding: 8px 12px; font-size: 12px; font-weight: 600; cursor: pointer; }
.location-bar { background: #fff; border-bottom: 1px solid #E5E7EB; padding: 12px 16px; }
.location-bar-inner { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.loc-card { border-radius: 10px; padding: 10px 12px; cursor: pointer; border: 1px solid #E5E7EB; background: #fff; transition: all 0.15s; text-align: left; }
.loc-card.active { box-shadow: 0 0 0 2px var(--lc); border-color: var(--lc); background: var(--lb); }
.loc-name { font-size: 12px; font-weight: 600; color: #374151; }
.loc-card.active .loc-name { color: var(--lt); }
.loc-count { font-size: 11px; font-weight: 700; background: #E5E7EB; color: #6B7280; border-radius: 20px; padding: 1px 6px; display: inline-block; margin-top: 4px; }
.loc-card.active .loc-count { background: var(--lc); color: #fff; }
.loc-bar-track { height: 3px; border-radius: 2px; background: #F3F4F6; overflow: hidden; margin-top: 6px; }
.loc-bar-fill { height: 100%; border-radius: 2px; background: var(--lc); transition: width 0.3s; }
.filters { padding: 10px 16px; max-width: 1200px; margin: 0 auto; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.filter-pill { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; border: 1px solid #E5E7EB; background: #fff; color: #6B7280; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.filter-pill.active { background: #6366F1; border-color: #6366F1; color: #fff; }
.sleeve-toggle { margin-left: auto; display: flex; gap: 4px; }
.sleeve-btn { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; border: 1px solid #E5E7EB; background: #fff; color: #6B7280; cursor: pointer; }
.sleeve-btn.active { background: #6366F1; border-color: #6366F1; color: #fff; }
.grid-wrap { padding: 0 16px 80px; max-width: 1200px; margin: 0 auto; }
.results-bar { padding: 8px 0; font-size: 12px; color: #9CA3AF; display: flex; align-items: center; gap: 8px; }
.clear-btn { color: #6366F1; background: none; border: none; font-size: 12px; font-weight: 600; cursor: pointer; padding: 0; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; }
.card { background: #fff; border: 1px solid #E5E7EB; border-radius: 12px; overflow: hidden; transition: box-shadow 0.2s; }
.card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.09); }
.card-img { height: 150px; background: #F3F4F6; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
.card-img img { width: 100%; height: 100%; object-fit: cover; }
.card-img .ph { font-size: 40px; opacity: 0.4; }
.card-body { padding: 10px 12px 12px; }
.card-name { font-size: 13px; font-weight: 600; color: #111; line-height: 1.3; margin-bottom: 3px; }
.card-cat { font-size: 11px; color: #9CA3AF; margin-bottom: 8px; }
.card-sleeve { font-size: 10px; color: #6B7280; background: #F3F4F6; padding: 1px 6px; border-radius: 10px; display: inline-block; margin-bottom: 6px; }
.loc-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; border: 1px solid; }
.loc-dot { width: 5px; height: 5px; border-radius: 50%; }
.card-actions { display: flex; gap: 5px; margin-top: 8px; }
.move-btn, .edit-btn { flex: 1; padding: 5px 0; border-radius: 6px; border: 1px solid #E5E7EB; background: #F9FAFB; font-size: 11px; font-weight: 500; color: #374151; cursor: pointer; position: relative; }
.move-menu { position: absolute; bottom: 110%; left: 0; right: 0; background: #fff; border: 1px solid #E5E7EB; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 200; overflow: hidden; min-width: 130px; }
.move-option { display: flex; width: 100%; text-align: left; padding: 8px 12px; background: none; border: none; border-bottom: 1px solid #F3F4F6; cursor: pointer; font-size: 12px; color: #374151; align-items: center; gap: 6px; }
.move-option:hover { background: #F9FAFB; }
.move-option:last-child { border-bottom: none; }
.empty { text-align: center; padding: 60px 20px; color: #9CA3AF; }
.empty-icon { font-size: 40px; margin-bottom: 10px; }
.empty-title { font-size: 15px; font-weight: 600; color: #374151; margin-bottom: 4px; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 16px; }
.modal { background: #fff; border-radius: 16px; width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 64px rgba(0,0,0,0.18); }
.modal-header { padding: 18px 20px 0; display: flex; justify-content: space-between; align-items: center; }
.modal-title { font-size: 17px; font-weight: 700; }
.modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: #9CA3AF; }
.modal-body { padding: 16px 20px 20px; display: flex; flex-direction: column; gap: 14px; }
.field label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 5px; }
.field input, .field select, .field textarea { width: 100%; padding: 9px 12px; border-radius: 8px; border: 1px solid #D1D5DB; font-size: 14px; color: #111; background: #fff; font-family: inherit; outline: none; }
.field textarea { resize: none; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.img-upload { height: 130px; border-radius: 10px; border: 2px dashed #D1D5DB; cursor: pointer; display: flex; align-items: center; justify-content: center; background: #F9FAFB; position: relative; overflow: hidden; }
.img-upload img { width: 100%; height: 100%; object-fit: cover; }
.img-upload-label { text-align: center; color: #9CA3AF; }
.img-upload-label .icon { font-size: 24px; }
.img-upload-label p { font-size: 12px; margin-top: 4px; }
.img-clear { position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,0.5); color: #fff; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.btn-cancel { padding: 9px 18px; border-radius: 8px; border: 1px solid #E5E7EB; background: #fff; cursor: pointer; font-size: 14px; font-weight: 500; }
.btn-save { padding: 9px 18px; border-radius: 8px; border: none; background: #6366F1; color: #fff; cursor: pointer; font-size: 14px; font-weight: 600; }
.btn-save:disabled { background: #C7D2FE; cursor: not-allowed; }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #111; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 500; z-index: 1000; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }
.loading { text-align: center; padding: 60px 20px; color: #9CA3AF; }
.spinner { width: 32px; height: 32px; border: 3px solid #E5E7EB; border-top-color: #6366F1; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
/* Migration panel */
.mig-panel { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 600; display: flex; align-items: center; justify-content: center; padding: 16px; }
.mig-box { background: #fff; border-radius: 16px; width: 100%; max-width: 560px; max-height: 85vh; overflow-y: auto; padding: 24px; box-shadow: 0 24px 64px rgba(0,0,0,0.2); }
.mig-box h2 { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
.mig-box .sub { font-size: 13px; color: #6B7280; margin-bottom: 20px; }
.mig-btn { background: #6366F1; color: #fff; border: none; border-radius: 8px; padding: 11px 20px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; }
.mig-btn.red { background: #EF4444; margin-top: 8px; }
.mig-btn.gray { background: #F3F4F6; color: #374151; margin-top: 8px; }
.mig-bar-track { height: 6px; border-radius: 3px; background: #E5E7EB; overflow: hidden; margin: 12px 0 6px; }
.mig-bar-fill { height: 100%; border-radius: 3px; background: #6366F1; transition: width 0.3s; width: 0%; }
.mig-prog { font-size: 12px; color: #6B7280; margin-bottom: 10px; }

.mll { padding: 1px 0; }
.mok { color: #059669; } .mer { color: #DC2626; } .min { color: #6366F1; } .mwn { color: #D97706; }
@media (max-width: 600px) {
 .search-input { width: 120px; }
 .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }

</head>
<body>
<div class="header">
 <div class="header-inner">
   <div class="header-left">
     <span style="font-size:20px">🪡</span>
     <span class="logo" id="logoTap">Wardrobe</span>
     <span class="count-badge" id="totalCount">0</span>
   </div>
   <input type="text" class="search-input" placeholder="Search…" id="searchInput" oninput="render()">
   <button class="sync-btn" id="syncBtn" onclick="loadFromSupabase()">↻ Sync</button>
   <button class="add-btn" onclick="openModal(null)">+ Add</button>
 </div>
</div>
<div class="location-bar">
 <div class="location-bar-inner" id="locCards"></div>
</div>
<div class="filters" id="catFilters"></div>
<div class="grid-wrap">
 <div class="results-bar" id="resultsBar"></div>
 <div id="gridContainer"></div>
</div>

<!-- Add/Edit Modal -->

<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="if(event.target===this)closeModal()">
 <div class="modal">
   <div class="modal-header">
     <span class="modal-title" id="modalTitle">Add Item</span>
     <button class="modal-close" onclick="closeModal()">×</button>
   </div>
   <div class="modal-body">
     <div class="img-upload" id="imgUpload" onclick="document.getElementById('imgFileInput').click()">
       <div class="img-upload-label" id="imgLabel"><div class="icon">📷</div><p>Tap to upload photo</p></div>
       <img id="imgPreview" style="display:none">
       <button class="img-clear" id="imgClear" style="display:none" onclick="event.stopPropagation();clearImage()">×</button>
       <input type="file" id="imgFileInput" accept="image/*" style="display:none" onchange="handleImageUpload(event)">
     </div>
     <div class="field"><label>Item name *</label><input type="text" id="fName" placeholder="e.g. Navy Blazer"></div>
     <div class="row2">
       <div class="field"><label>Category</label><select id="fCategory"></select></div>
       <div class="field"><label>Location</label><select id="fLocation"></select></div>
     </div>
     <div class="field"><label>Sleeve length</label><select id="fSleeve"><option value="">— none —</option><option value="Short">Short</option><option value="Long">Long</option></select></div>
     <div class="field"><label>Notes (optional)</label><textarea id="fNotes" rows="2" placeholder="Brand, size, condition…"></textarea></div>
     <div class="modal-actions">
       <button class="btn-cancel" onclick="closeModal()">Cancel</button>
       <button class="btn-save" id="saveBtn" onclick="saveItem()">Save</button>
     </div>
   </div>
 </div>
</div>

<!-- Migration Panel -->

<div class="mig-panel" id="migPanel" style="display:none">
 <div class="mig-box">
   <h2>📸 Photo Migration</h2>
   <p class="sub">Downloads photos from Airtable and saves them permanently to Supabase Storage. Run once — takes about 5 minutes.</p>
   <button class="mig-btn" id="migStart" onclick="startMigration()">Start Migration</button>
   <button class="mig-btn red" id="migStop" onclick="stopMigration()" style="display:none">Stop</button>
   <button class="mig-btn gray" onclick="document.getElementById('migPanel').style.display='none'">Close</button>
   <div id="migProgress" style="display:none">
     <div class="mig-bar-track"><div class="mig-bar-fill" id="migBar"></div></div>
     <div class="mig-prog" id="migProg">Starting…</div>
     <div class="mig-log" id="migLog"></div>
   </div>
 </div>
</div>

<div class="toast" id="toast"></div>

// ── STATE ─────────────────────────────────────────────────────────
let items = [];
let activeLoc = 'All', activeCat = 'All', activeSleeve = 'All';
let editingItem = null, editingImage = null, seeded = false;
let logoTaps = 0, logoTimer = null;

// ── LOGO TAP (5 taps opens migration) ────────────────────────────
document.getElementById('logoTap').addEventListener('click', function() {
 logoTaps++;
 clearTimeout(logoTimer);
 if (logoTaps >= 5) {

 } else {

// ── SUPABASE ──────────────────────────────────────────────────────
async function sbFetch(path, opts) {
 opts = opts || {};
 const res = await fetch(SU + '/rest/v1/' + path, {
   headers: {
     'apikey': SK,
     'Authorization': 'Bearer ' + SK,
     'Content-Type': 'application/json',
     'Prefer': opts.prefer || 'return=representation'
   },
   method: opts.method || 'GET',
   body: opts.body
 });
 if (!res.ok) { const e = await res.text(); throw new Error(e); }
 const t = await res.text();
 return t ? JSON.parse(t) : null;
}

async function loadFromSupabase() {
 const btn = document.getElementById('syncBtn');
 btn.textContent = '↻ Syncing…';
 try {
   const data = await sbFetch('items?select=*&order=created_at.asc', {prefer:''});
   if (data && data.length > 0) {
     items = data.map(r => ({id:r.id,name:r.name,category:r.category,location:r.location,sleeve:r.sleeve,image:r.image_url,notes:r.notes||''}));
     seeded = true;
     render();
     showToast('Loaded ' + items.length + ' items');
   } else if (!seeded) {
     await seedDatabase();
   }
 } catch(e) { showToast('Sync error'); console.error(e); }
 btn.textContent = '↻ Sync';
}

async function seedDatabase() {
 showToast('Setting up your wardrobe…');
 const rows = SEED.map(function(s) { return {name:s[0],image_url:s[1],location:s[2],category:s[3],sleeve:s[4],notes:''}; });
 for (let i = 0; i < rows.length; i += 50) {
   await sbFetch('items', {method:'POST', body:JSON.stringify(rows.slice(i,i+50)), prefer:'return=minimal'});
 }
 seeded = true;
 await loadFromSupabase();
}

async function saveToSupabase(item) {
 const row = {name:item.name,category:item.category,location:item.location,sleeve:item.sleeve,image_url:item.image||'',notes:item.notes||''};
 if (item.id && item.id.length > 10 && !item.id.startsWith('new-')) {
   await sbFetch('items?id=eq.'+item.id, {method:'PATCH', body:JSON.stringify(row), prefer:'return=minimal'});
 } else {
   const res = await sbFetch('items', {method:'POST', body:JSON.stringify(row)});
   if (res && res[0]) item.id = res[0].id;
 }
 return item;
}

async function moveInSupabase(id, loc) {
 await sbFetch('items?id=eq.'+id, {method:'PATCH', body:JSON.stringify({location:loc}), prefer:'return=minimal'});
}

async function deleteFromSupabase(id) {
 await sbFetch('items?id=eq.'+id, {method:'DELETE', prefer:'return=minimal'});
}

// ── RENDER ────────────────────────────────────────────────────────
function render() {
 const search = document.getElementById('searchInput').value.toLowerCase();
 const filtered = items.filter(function(item) {
   return (activeLoc === 'All' || item.location === activeLoc)
     && (activeCat === 'All' || item.category === activeCat)
     && (activeSleeve === 'All' || item.sleeve === activeSleeve)
     && (!search || item.name.toLowerCase().includes(search) || item.category.toLowerCase().includes(search));
 });

 document.getElementById('totalCount').textContent = items.length;

 // Location cards
 document.getElementById('locCards').innerHTML = LOCATIONS.map(function(loc) {
   const s = LOC_STYLES[loc];
   const count = items.filter(function(i) { return i.location === loc; }).length;
   const pct = items.length ? (count/items.length*100) : 0;
   const active = activeLoc === loc;
   return '<button class="loc-card'+(active?' active':'')+'" style="--lc:'+s.dot+';--lb:'+s.bg+';--lt:'+s.text+'" onclick="toggleLoc(\''+loc+'\')">'
     +'<div style="display:flex;justify-content:space-between;align-items:center"><span class="loc-name">'+loc+'</span><span class="loc-count">'+count+'</span></div>'
     +'<div class="loc-bar-track"><div class="loc-bar-fill" style="width:'+pct+'%"></div></div></button>';
 }).join('');

 // Category pills
 const cats = ['All'].concat(CATEGORIES);
 document.getElementById('catFilters').innerHTML = cats.map(function(cat) {
   const icon = cat !== 'All' ? (CAT_ICONS[cat]||'') : '';
   return '<button class="filter-pill'+(activeCat===cat?' active':'')+'" onclick="toggleCat(\''+cat+'\')">'+(icon?icon+' ':'')+cat+'</button>';
 }).join('')
 + '<div class="sleeve-toggle">'
 + ['All','Short','Long'].map(function(s) { return '<button class="sleeve-btn'+(activeSleeve===s?' active':'')+'" onclick="toggleSleeve(\''+s+'\')">'+s+'</button>'; }).join('')
 + '</div>';

 // Results bar
 const hasFilter = activeLoc!=='All'||activeCat!=='All'||activeSleeve!=='All'||search;
 document.getElementById('resultsBar').innerHTML = hasFilter
   ? 'Showing '+filtered.length+' of '+items.length+' items <button class="clear-btn" onclick="clearFilters()">Clear filters</button>'
   : items.length+' items total';

 // Grid
 if (items.length === 0) {
   document.getElementById('gridContainer').innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading your wardrobe…</p></div>';
   return;
 }
 if (filtered.length === 0) {
   document.getElementById('gridContainer').innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">No items found</div><p>Try a different filter</p></div>';
   return;
 }

 document.getElementById('gridContainer').innerHTML = '<div class="grid">'+filtered.map(cardHTML).join('')+'</div>';
}

function cardHTML(item) {
 const s = LOC_STYLES[item.location] || LOC_STYLES['Aspen'];
 const icon = CAT_ICONS[item.category] || '👔';
 const imgHTML = item.image
   ? '<img src="'+item.image+'" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'" loading="lazy"><span class="ph" style="display:none">'+icon+'</span>'
   : '<span class="ph">'+icon+'</span>';
 const sleeveHTML = item.sleeve ? '<span class="card-sleeve">'+item.sleeve+' sleeve</span><br>' : '';
 const otherLocs = LOCATIONS.filter(function(l) { return l !== item.location; });
 const menuHTML = '<div class="move-menu" id="menu-'+item.id+'" style="display:none">'
   + otherLocs.map(function(loc) {
       const ls = LOC_STYLES[loc];
       return '<button class="move-option" onclick="moveItem(\''+item.id+'\',\''+loc+'\')">'
         +'<span style="width:8px;height:8px;border-radius:50%;background:'+ls.dot+';display:inline-block"></span>'+loc+'</button>';
     }).join('')
   + '</div>';
 return '<div class="card"><div class="card-img">'+imgHTML+'</div>'
   +'<div class="card-body"><div class="card-name">'+item.name+'</div>'
   +'<div class="card-cat">'+icon+' '+item.category+'</div>'
   +sleeveHTML
   +'<span class="loc-badge" style="background:'+s.bg+';color:'+s.text+';border-color:'+s.border+'">'
   +'<span class="loc-dot" style="background:'+s.dot+'"></span>'+item.location+'</span>'
   +'<div class="card-actions">'
   +'<button class="move-btn" onclick="toggleMenu(\''+item.id+'\',event)">Move ▾'+menuHTML+'</button>'
   +'<button class="edit-btn" onclick="openModal(\''+item.id+'\')">Edit</button>'
   +'</div></div></div>';
}

// ── INTERACTIONS ──────────────────────────────────────────────────
function toggleLoc(loc) { activeLoc = activeLoc===loc?'All':loc; render(); }
function toggleCat(cat) { activeCat = cat; render(); }
function toggleSleeve(s) { activeSleeve = s; render(); }
function clearFilters() { activeLoc='All'; activeCat='All'; activeSleeve='All'; document.getElementById('searchInput').value=''; render(); }

function toggleMenu(id, e) {
 e.stopPropagation();
 const menu = document.getElementById('menu-'+id);
 if (!menu) return;
 const isOpen = menu.style.display === 'block';
 document.querySelectorAll('.move-menu').forEach(function(m) { m.style.display='none'; });
 if (!isOpen) menu.style.display = 'block';
}
document.addEventListener('click', function() {
 document.querySelectorAll('.move-menu').forEach(function(m) { m.style.display='none'; });
});

async function moveItem(id, newLoc) {
 const item = items.find(function(i) { return i.id===id; });
 if (!item) return;
 item.location = newLoc;
 render();
 try { await moveInSupabase(id, newLoc); showToast('Moved to '+newLoc); }
 catch(e) { showToast('Error saving move'); }
}

// ── MODAL ─────────────────────────────────────────────────────────
function openModal(idOrNull) {
 document.getElementById('fCategory').innerHTML = CATEGORIES.map(function(c) { return '<option value="'+c+'">'+c+'</option>'; }).join('');
 document.getElementById('fLocation').innerHTML = LOCATIONS.map(function(l) { return '<option value="'+l+'">'+l+'</option>'; }).join('');
 if (idOrNull) {
   editingItem = items.find(function(i) { return i.id===idOrNull; });
   document.getElementById('modalTitle').textContent = 'Edit Item';
   document.getElementById('fName').value = editingItem.name;
   document.getElementById('fCategory').value = editingItem.category;
   document.getElementById('fLocation').value = editingItem.location;
   document.getElementById('fSleeve').value = editingItem.sleeve||'';
   document.getElementById('fNotes').value = editingItem.notes||'';
   editingImage = editingItem.image||null;
   if (editingImage) {
     document.getElementById('imgPreview').src = editingImage;
     document.getElementById('imgPreview').style.display = 'block';
     document.getElementById('imgLabel').style.display = 'none';
     document.getElementById('imgClear').style.display = 'flex';
   } else {
     document.getElementById('imgPreview').style.display = 'none';
     document.getElementById('imgLabel').style.display = 'block';
     document.getElementById('imgClear').style.display = 'none';
   }
 } else {
   editingItem = null;
   document.getElementById('modalTitle').textContent = 'Add Item';
   document.getElementById('fName').value = '';
   document.getElementById('fCategory').value = CATEGORIES[0];
   document.getElementById('fLocation').value = activeLoc!=='All'?activeLoc:'Aspen';
   document.getElementById('fSleeve').value = '';
   document.getElementById('fNotes').value = '';
   editingImage = null;
   document.getElementById('imgPreview').style.display = 'none';
   document.getElementById('imgLabel').style.display = 'block';
   document.getElementById('imgClear').style.display = 'none';
 }
 document.getElementById('modalOverlay').style.display = 'flex';
}
function closeModal() { document.getElementById('modalOverlay').style.display='none'; editingItem=null; editingImage=null; }

function handleImageUpload(e) {
 const file = e.target.files[0];
 if (!file) return;
 const reader = new FileReader();
 reader.onload = function(ev) {
   editingImage = ev.target.result;
   document.getElementById('imgPreview').src = editingImage;
   document.getElementById('imgPreview').style.display = 'block';
   document.getElementById('imgLabel').style.display = 'none';
   document.getElementById('imgClear').style.display = 'flex';
 };
 reader.readAsDataURL(file);
}
function clearImage() {
 editingImage = null;
 document.getElementById('imgPreview').style.display = 'none';
 document.getElementById('imgLabel').style.display = 'block';
 document.getElementById('imgClear').style.display = 'none';
 document.getElementById('imgFileInput').value = '';
}

async function saveItem() {
 const name = document.getElementById('fName').value.trim();
 if (!name) return;
 const btn = document.getElementById('saveBtn');
 btn.disabled = true; btn.textContent = 'Saving…';
 const item = {
   id: editingItem ? editingItem.id : ('new-'+Date.now()),
   name: name,
   category: document.getElementById('fCategory').value,
   location: document.getElementById('fLocation').value,
   sleeve: document.getElementById('fSleeve').value,
   notes: document.getElementById('fNotes').value,
   image: editingImage
 };
 try {
   const saved = await saveToSupabase(item);
   if (editingItem) {
     const idx = items.findIndex(function(i) { return i.id===editingItem.id; });
     if (idx >= 0) items[idx] = saved;
   } else { items.push(saved); }
   render(); closeModal(); showToast(editingItem?'Item updated':'Item added');
 } catch(e) { showToast('Error saving item'); console.error(e); }
 btn.disabled = false; btn.textContent = 'Save';
}

// ── TOAST ─────────────────────────────────────────────────────────
function showToast(msg) {

}

// ── MIGRATION ─────────────────────────────────────────────────────
let migRunning = false;
let migStats = {done:0,skip:0,err:0,total:0};

function migLog(msg, cls) {
 const el = document.getElementById('migLog');
 const d = document.createElement('div');
 d.className = 'mll '+(cls||'min');
 d.textContent = '['+new Date().toLocaleTimeString()+'] '+msg;
 el.appendChild(d);
 el.scrollTop = el.scrollHeight;
}
function migProg(n, t) {
 const p = t ? Math.round(n/t*100) : 0;
 document.getElementById('migBar').style.width = p+'%';
 document.getElementById('migProg').textContent = n+' of '+t+' ('+p+'%)';
}

async function startMigration() {
 migRunning = true;
 migStats = {done:0,skip:0,err:0,total:0};
 document.getElementById('migStart').style.display = 'none';
 document.getElementById('migStop').style.display = 'block';
 document.getElementById('migProgress').style.display = 'block';
 document.getElementById('migLog').innerHTML = '';

 try {
   migLog('Fetching Airtable records…');
   let atRecs = [], off = null;
   do {
     let url = 'https://api.airtable.com/v0/'+AB+'/'+AT2+'?pageSize=100';
     if (off) url += '&offset='+off;
     const r = await fetch(url, {headers:{'Authorization':'Bearer '+AT}});
     if (!r.ok) throw new Error('Airtable '+r.status);
     const d = await r.json();
     atRecs = atRecs.concat(d.records);
     off = d.offset;
     migLog('Fetched '+atRecs.length+' records…');
   } while (off);
   migLog('Got '+atRecs.length+' Airtable records', 'mok');

   migLog('Fetching Supabase items…');
   const sbItems = await sbFetch('items?select=id,name,image_url&limit=1000', {prefer:''});
   migLog('Got '+sbItems.length+' Supabase items', 'mok');

   const map = {};
   sbItems.forEach(function(i) { map[i.name.toLowerCase().trim()] = i; });

   const withPics = atRecs.filter(function(r) { return r.fields.Picture && r.fields.Picture.length > 0; });
   migLog(withPics.length+' records have photos');
   migStats.total = withPics.length;
   migProg(0, migStats.total);

   for (let i = 0; i < withPics.length; i++) {
     if (!migRunning) { migLog('Stopped.','mwn'); break; }
     const rec = withPics[i];
     const name = rec.fields.Name || '';
     const pic = rec.fields.Picture[0];
     const sbItem = map[name.toLowerCase().trim()];

     if (!sbItem) { migLog('No match: "'+name+'"','mwn'); migStats.skip++; migProg(i+1,migStats.total); continue; }

     try {
       const ir = await fetch(pic.url);
       if (!ir.ok) throw new Error('Download '+ir.status);
       const blob = await ir.blob();
       const ext = (pic.filename||'photo.jpg').split('.').pop();
       const safe = name.replace(/[^a-zA-Z0-9]/g,'_').toLowerCase();
       const fname = safe+'_'+sbItem.id.slice(0,8)+'.'+ext;
       const path = 'photos/'+fname;

       const ur = await fetch(SU+'/storage/v1/object/'+BK+'/'+path, {
         method:'POST',
         headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':blob.type||'image/jpeg','x-upsert':'true'},
         body:blob
       });
       if (!ur.ok) { const e = await ur.text(); throw new Error('Upload: '+e); }
       const pubUrl = SU+'/storage/v1/object/public/'+BK+'/'+path;

       await sbFetch('items?id=eq.'+sbItem.id, {method:'PATCH', body:JSON.stringify({image_url:pubUrl}), prefer:'return=minimal'});

       // Update local items array too
       const localItem = items.find(function(it) { return it.id===sbItem.id; });
       if (localItem) localItem.image = pubUrl;

       migLog('✓ '+name, 'mok');
       migStats.done++;
     } catch(e) {
       migLog('✗ '+name+': '+e.message, 'mer');
       migStats.err++;
     }

     migProg(i+1, migStats.total);
     await new Promise(function(r) { setTimeout(r,200); });
   }

   migLog('Complete: '+migStats.done+' done, '+migStats.skip+' skipped, '+migStats.err+' errors', 'mok');
   render();

 } catch(e) {
   migLog('FATAL: '+e.message, 'mer');
   console.error(e);
 }

 migRunning = false;
 document.getElementById('migStart').style.display = 'block';
 document.getElementById('migStart').textContent = 'Run Again';
 document.getElementById('migStop').style.display = 'none';
}

function stopMigration() { migRunning = false; }

// ── INIT ──────────────────────────────────────────────────────────
render();
loadFromSupabase();
</script>
