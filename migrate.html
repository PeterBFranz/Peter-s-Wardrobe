
<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Migration Tool</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F8F9FB; padding: 24px; color: #111; }
  .card { background: #fff; border-radius: 14px; padding: 24px; max-width: 700px; margin: 0 auto; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .sub { color: #6B7280; font-size: 14px; margin-bottom: 24px; }
  .btn { background: #6366F1; color: #fff; border: none; border-radius: 8px; padding: 12px 24px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; }
  .btn:disabled { background: #C7D2FE; cursor: not-allowed; }
  .btn.stop { background: #EF4444; }
  .progress-wrap { margin-top: 20px; display: none; }
  .progress-bar-track { height: 8px; border-radius: 4px; background: #E5E7EB; overflow: hidden; margin-bottom: 8px; }
  .progress-bar-fill { height: 100%; border-radius: 4px; background: #6366F1; transition: width 0.3s; width: 0%; }
  .progress-text { font-size: 13px; color: #6B7280; margin-bottom: 16px; }
  .log { background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 8px; padding: 12px; height: 320px; overflow-y: auto; font-size: 12px; font-family: monospace; }
  .log-line { padding: 2px 0; border-bottom: 1px solid #F3F4F6; }
  .log-line.ok { color: #059669; }
  .log-line.err { color: #DC2626; }
  .log-line.info { color: #6366F1; }
  .log-line.warn { color: #D97706; }
  .summary { margin-top: 16px; padding: 14px; border-radius: 8px; background: #ECFDF5; border: 1px solid #6EE7B7; display: none; }
  .summary h3 { font-size: 15px; font-weight: 700; color: #065F46; }
  .summary p { font-size: 13px; color: #047857; margin-top: 4px; }
</style>
</head>
<body>
<div class="card">
  <h1>📸 Photo Migration Tool</h1>
  <p class="sub">Pulls photos from Airtable → uploads to Supabase Storage → updates your wardrobe database</p>

<button class="btn" id="startBtn" onclick="startMigration()">Start Migration</button>
<button class="btn stop" id="stopBtn" onclick="stopMigration()" style="display:none;margin-top:8px">Stop</button>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progressBar"></div></div>
    <div class="progress-text" id="progressText">Starting…</div>
    <div class="log" id="log"></div>
  </div>

  <div class="summary" id="summary">
    <h3>✅ Migration Complete</h3>
    <p id="summaryText"></p>
  </div>
</div>

<script>
const AIRTABLE_TOKEN = 'patxcfhuVrX2kjPqg.9199115d74c8f5d1f8ed59caad3204b0f9f3d5f1e7eedd05dfd51c73ceada42b';
const AIRTABLE_BASE = 'appgBuchwjWkX0yRx';
const AIRTABLE_TABLE = 'tbl5FUKIsv67GJwU0';
const SUPABASE_URL = 'https://fyqcokjvdhzbsdnsnxdi.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5cWNva2p2ZGh6YnNkbnNueGRpIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc0MjkxOTc1NSwiZXhwIjoyMDk4MDk3NzU1fQ.JilfeUjKCn_QmcrzSMnHkzqCIGjvpN8mRODxjCOmUVA';

let running = false;
let stats = { done: 0, skipped: 0, errors: 0, total: 0 };

function log(msg, type = 'info') {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  line.className = `log-line ${type}`;
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function setProgress(done, total) {
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} of ${total} items processed (${pct}%)`;
}

async function fetchAllAirtableRecords() {
  let records = [];
  let offset = null;
  do {
    let url = `https://api.airtable.com/v0/${AIRTABLE_BASE}/${AIRTABLE_TABLE}?pageSize=100`;
    if (offset) url += `&offset=${offset}`;
    const res = await fetch(url, {
      headers: { 'Authorization': `Bearer ${AIRTABLE_TOKEN}` }
    });
    if (!res.ok) throw new Error(`Airtable error: ${res.status} ${await res.text()}`);
    const data = await res.json();
    records = records.concat(data.records);
    offset = data.offset;
    log(`Fetched ${records.length} records from Airtable…`, 'info');
  } while (offset);
  return records;
}

async function fetchAllSupabaseItems() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/items?select=id,name,image_url&limit=1000`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`
    }
  });
  if (!res.ok) throw new Error(`Supabase error: ${res.status}`);
  return await res.json();
}

async function uploadToSupabaseStorage(filename, blob) {
  // Try to upload; if exists, update
  const path = `photos/${filename}`;
  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/wardrobe-photos/${path}`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': blob.type || 'image/jpeg',
      'x-upsert': 'true'
    },
    body: blob
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(`Storage upload failed: ${err}`);
  }
  // Return public URL
  return `${SUPABASE_URL}/storage/v1/object/public/wardrobe-photos/${path}`;
}

async function updateSupabaseImageUrl(id, imageUrl) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/items?id=eq.${id}`, {
    method: 'PATCH',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify({ image_url: imageUrl })
  });
  if (!res.ok) throw new Error(`DB update failed: ${res.status}`);
}

async function ensureStorageBucket() {
  // Check if bucket exists
  const res = await fetch(`${SUPABASE_URL}/storage/v1/bucket/wardrobe-photos`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`
    }
  });
  if (res.status === 404 || res.status === 400) {
    // Create bucket
    const create = await fetch(`${SUPABASE_URL}/storage/v1/bucket`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ id: 'wardrobe-photos', name: 'wardrobe-photos', public: true })
    });
    if (!create.ok) {
      const err = await create.text();
      // If already exists that's fine
      if (!err.includes('already exists')) throw new Error(`Bucket creation failed: ${err}`);
    }
    log('Created Supabase Storage bucket: wardrobe-photos', 'ok');
  } else {
    log('Supabase Storage bucket ready', 'ok');
  }
}

function normalize(str) {
  return str.toLowerCase().trim().replace(/\s+/g, ' ');
}

async function startMigration() {
  running = true;
  stats = { done: 0, skipped: 0, errors: 0, total: 0 };
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display = 'block';
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('summary').style.display = 'none';
  document.getElementById('log').innerHTML = '';

  try {
    // Step 1: Ensure storage bucket exists
    log('Setting up Supabase Storage…', 'info');
    await ensureStorageBucket();

    // Step 2: Fetch all Airtable records
    log('Fetching records from Airtable…', 'info');
    const atRecords = await fetchAllAirtableRecords();
    log(`Found ${atRecords.length} Airtable records`, 'ok');

    // Step 3: Fetch all Supabase items
    log('Fetching items from Supabase…', 'info');
    const sbItems = await fetchAllSupabaseItems();
    log(`Found ${sbItems.length} Supabase items`, 'ok');

    // Build name→id map for Supabase
    const sbMap = {};
    sbItems.forEach(item => { sbMap[normalize(item.name)] = item; });

    // Filter Airtable records that have photos
    const withPhotos = atRecords.filter(r => r.fields.Picture && r.fields.Picture.length > 0);
    log(`${withPhotos.length} Airtable records have photos`, 'info');
    stats.total = withPhotos.length;
    setProgress(0, stats.total);

    // Step 4: Process each record
    for (let i = 0; i < withPhotos.length; i++) {
      if (!running) { log('Migration stopped by user.', 'warn'); break; }

      const record = withPhotos[i];
      const name = record.fields.Name || record.fields['Name'] || '';
      const photo = record.fields.Picture[0];
      const photoUrl = photo.url;

      const sbItem = sbMap[normalize(name)];
      if (!sbItem) {
        log(`⚠ No match in Supabase for: "${name}"`, 'warn');
        stats.skipped++;
        setProgress(i + 1, stats.total);
        continue;
      }

      try {
        // Download photo from Airtable
        const imgRes = await fetch(photoUrl);
        if (!imgRes.ok) throw new Error(`Download failed: ${imgRes.status}`);
        const blob = await imgRes.blob();

        // Create safe filename
        const ext = photo.filename ? photo.filename.split('.').pop() : 'jpg';
        const safeName = name.replace(/[^a-zA-Z0-9]/g, '_').toLowerCase();
        const filename = `${safeName}_${sbItem.id.slice(0,8)}.${ext}`;

        // Upload to Supabase Storage
        const publicUrl = await uploadToSupabaseStorage(filename, blob);

        // Update Supabase DB record
        await updateSupabaseImageUrl(sbItem.id, publicUrl);

        log(`✓ ${name}`, 'ok');
        stats.done++;
      } catch(e) {
        log(`✗ ${name}: ${e.message}`, 'err');
        stats.errors++;
      }

      setProgress(i + 1, stats.total);

      // Small delay to avoid rate limiting
      await new Promise(r => setTimeout(r, 200));
    }

    // Done
    const summaryEl = document.getElementById('summary');
    summaryEl.style.display = 'block';
    document.getElementById('summaryText').textContent =
      `✓ ${stats.done} photos migrated  •  ${stats.skipped} skipped (no match)  •  ${stats.errors} errors`;
    log(`Migration complete: ${stats.done} done, ${stats.skipped} skipped, ${stats.errors} errors`, 'info');

  } catch(e) {
    log(`FATAL ERROR: ${e.message}`, 'err');
    console.error(e);
  }

  running = false;
  document.getElementById('startBtn').style.display = 'block';
  document.getElementById('startBtn').textContent = 'Run Again';
  document.getElementById('stopBtn').style.display = 'none';
}

function stopMigration() {
  running = false;
  log('Stopping after current item…', 'warn');
}
</script>

</body>
</html>
