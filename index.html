<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Wardrobe">
<title>Peter's Wardrobe</title>
<style>
 * { box-sizing: border-box; margin: 0; padding: 0; }
 body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F8F9FB; color: #111; min-height: 100vh; }

/* Header */
.header { background: #fff; border-bottom: 1px solid #E5E7EB; padding: 0 16px; position: sticky; top: 0; z-index: 100; }
.header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; gap: 10px; }
.header-left { display: flex; align-items: center; gap: 8px; }
.logo { font-size: 20px; font-weight: 700; color: #111; letter-spacing: -0.5px; }
.count-badge { background: #EEF2FF; color: #4F46E5; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
.search-input { padding: 7px 12px; border-radius: 20px; border: 1px solid #E5E7EB; font-size: 13px; width: 180px; outline: none; background: #F9FAFB; }
.add-btn { background: #6366F1; color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.sync-btn { background: #F3F4F6; color: #374151; border: none; border-radius: 8px; padding: 8px 12px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.sync-btn.syncing { opacity: 0.6; }

/* Location cards */
.location-bar { background: #fff; border-bottom: 1px solid #E5E7EB; padding: 12px 16px; }
.location-bar-inner { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.loc-card { border-radius: 10px; padding: 10px 12px; cursor: pointer; border: 1px solid #E5E7EB; background: #fff; transition: all 0.15s; text-align: left; }
.loc-card.active { box-shadow: 0 0 0 2px var(–loc-color); border-color: var(–loc-color); background: var(–loc-bg); }
.loc-name { font-size: 12px; font-weight: 600; color: #374151; }
.loc-card.active .loc-name { color: var(–loc-text); }
.loc-count { font-size: 11px; font-weight: 700; background: #E5E7EB; color: #6B7280; border-radius: 20px; padding: 1px 6px; display: inline-block; margin-top: 4px; }
.loc-card.active .loc-count { background: var(–loc-color); color: #fff; }
.loc-bar-track { height: 3px; border-radius: 2px; background: #F3F4F6; overflow: hidden; margin-top: 6px; }
.loc-bar-fill { height: 100%; border-radius: 2px; background: var(–loc-color); transition: width 0.3s; }

/* Filters */
.filters { padding: 10px 16px; max-width: 1200px; margin: 0 auto; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.filter-pill { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; border: 1px solid #E5E7EB; background: #fff; color: #6B7280; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.filter-pill.active { background: #6366F1; border-color: #6366F1; color: #fff; }
.sleeve-toggle { margin-left: auto; display: flex; gap: 4px; }
.sleeve-btn { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; border: 1px solid #E5E7EB; background: #fff; color: #6B7280; cursor: pointer; }
.sleeve-btn.active { background: #6366F1; border-color: #6366F1; color: #fff; }

/* Grid */
.grid-wrap { padding: 0 16px 80px; max-width: 1200px; margin: 0 auto; }
.results-bar { padding: 8px 0; font-size: 12px; color: #9CA3AF; display: flex; align-items: center; gap: 8px; }
.clear-btn { color: #6366F1; background: none; border: none; font-size: 12px; font-weight: 600; cursor: pointer; padding: 0; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; }

/* Card */
.card { background: #fff; border: 1px solid #E5E7EB; border-radius: 12px; overflow: hidden; cursor: default; transition: box-shadow 0.2s; }
.card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.09); }
.card-img { height: 150px; background: #F3F4F6; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
.card-img img { width: 100%; height: 100%; object-fit: cover; }
.card-img .placeholder { font-size: 40px; opacity: 0.4; }
.card-body { padding: 10px 12px 12px; }
.card-name { font-size: 13px; font-weight: 600; color: #111; line-height: 1.3; margin-bottom: 3px; }
.card-cat { font-size: 11px; color: #9CA3AF; margin-bottom: 8px; }
.card-sleeve { font-size: 10px; color: #6B7280; background: #F3F4F6; padding: 1px 6px; border-radius: 10px; display: inline-block; margin-bottom: 6px; }
.loc-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; border: 1px solid; }
.loc-dot { width: 5px; height: 5px; border-radius: 50%; }
.card-actions { display: flex; gap: 5px; margin-top: 8px; }
.move-btn, .edit-btn { flex: 1; padding: 5px 0; border-radius: 6px; border: 1px solid #E5E7EB; background: #F9FAFB; font-size: 11px; font-weight: 500; color: #374151; cursor: pointer; position: relative; }
.move-menu { position: absolute; bottom: 110%; left: 0; right: 0; background: #fff; border: 1px solid #E5E7EB; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 200; overflow: hidden; min-width: 130px; }
.move-option { display: block; width: 100%; text-align: left; padding: 8px 12px; background: none; border: none; border-bottom: 1px solid #F3F4F6; cursor: pointer; font-size: 12px; color: #374151; display: flex; align-items: center; gap: 6px; }
.move-option:hover { background: #F9FAFB; }
.move-option:last-child { border-bottom: none; }

/* Empty */
.empty { text-align: center; padding: 60px 20px; color: #9CA3AF; }
.empty-icon { font-size: 40px; margin-bottom: 10px; }
.empty-title { font-size: 15px; font-weight: 600; color: #374151; margin-bottom: 4px; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 16px; }
.modal { background: #fff; border-radius: 16px; width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 64px rgba(0,0,0,0.18); }
.modal-header { padding: 18px 20px 0; display: flex; justify-content: space-between; align-items: center; }
.modal-title { font-size: 17px; font-weight: 700; }
.modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: #9CA3AF; line-height: 1; padding: 4px; }
.modal-body { padding: 16px 20px 20px; display: flex; flex-direction: column; gap: 14px; }
.field label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 5px; letter-spacing: 0.3px; }
.field input, .field select, .field textarea { width: 100%; padding: 9px 12px; border-radius: 8px; border: 1px solid #D1D5DB; font-size: 14px; color: #111; background: #fff; font-family: inherit; outline: none; }
.field textarea { resize: none; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.img-upload { height: 130px; border-radius: 10px; border: 2px dashed #D1D5DB; cursor: pointer; display: flex; align-items: center; justify-content: center; background: #F9FAFB; position: relative; overflow: hidden; }
.img-upload img { width: 100%; height: 100%; object-fit: cover; }
.img-upload-label { text-align: center; color: #9CA3AF; }
.img-upload-label .icon { font-size: 24px; }
.img-upload-label p { font-size: 12px; margin-top: 4px; }
.img-clear { position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,0.5); color: #fff; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.btn-cancel { padding: 9px 18px; border-radius: 8px; border: 1px solid #E5E7EB; background: #fff; cursor: pointer; font-size: 14px; font-weight: 500; }
.btn-save { padding: 9px 18px; border-radius: 8px; border: none; background: #6366F1; color: #fff; cursor: pointer; font-size: 14px; font-weight: 600; }
.btn-save:disabled { background: #C7D2FE; cursor: not-allowed; }

/* Toast */
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #111; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 500; z-index: 1000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }

/* Loading */
.loading { text-align: center; padding: 60px 20px; color: #9CA3AF; }
.spinner { width: 32px; height: 32px; border: 3px solid #E5E7EB; border-top-color: #6366F1; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 600px) {
.search-input { width: 120px; }
.grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
.loc-name { font-size: 11px; }
}
</style>

       <input type="file" id="imgFileInput" accept="image/*" style="display:none" onchange="handleImageUpload(event)">
     </div>
     <div class="field">
       <label>Item name *</label>
       <input type="text" id="fName" placeholder="e.g. Navy Blazer">
     </div>
     <div class="row2">
       <div class="field">
         <label>Category</label>
         <select id="fCategory"></select>
       </div>
       <div class="field">
         <label>Location</label>
         <select id="fLocation"></select>
       </div>
     </div>
     <div class="field">
       <label>Sleeve length</label>

         <option value="Long">Long</option>

     </div>
     <div class="field">
       <label>Notes (optional)</label>
       <textarea id="fNotes" rows="2" placeholder="Brand, size, condition…"></textarea>
     </div>
     <div class="modal-actions">
       <button class="btn-cancel" onclick="closeModal()">Cancel</button>
       <button class="btn-save" id="saveBtn" onclick="saveItem()">Save</button>
     </div>
   </div>
 </div>
</div>

<div class="toast" id="toast"></div>

// ── STATE ───────────────────────────────────────────────
let items = [];
let activeLoc = 'All';
let activeCat = 'All';
let activeSleeve = 'All';
let editingItem = null;
let editingImage = null;
let seeded = false;
let openMenuId = null;

// ── SUPABASE API ────────────────────────────────────────
async function sbFetch(path, opts = {}) {
 const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
   headers: {
     'apikey': SUPABASE_KEY,
     'Authorization': `Bearer ${SUPABASE_KEY}`,
     'Content-Type': 'application/json',
     'Prefer': opts.prefer || 'return=representation',
     ...opts.headers
   },
   ...opts
 });
 if (!res.ok) {
   const err = await res.text();
   throw new Error(err);
 }
 const text = await res.text();
 return text ? JSON.parse(text) : null;
}

async function loadFromSupabase() {
 const btn = document.getElementById('syncBtn');
 btn.textContent = '↻ Syncing…';
 btn.classList.add('syncing');
 try {
   const data = await sbFetch('items?select=*&order=created_at.asc', { prefer: '' });
   if (data && data.length > 0) {
     items = data.map(r => ({
       id: r.id, name: r.name, category: r.category,
       location: r.location, sleeve: r.sleeve,
       image: r.image_url, notes: r.notes || ''
     }));
     seeded = true;
     render();
     showToast(`Loaded ${items.length} items`);
   } else if (!seeded) {
     await seedDatabase();
   }
 } catch(e) {
   showToast('Sync error — check console');
   console.error(e);
 }
 btn.textContent = '↻ Sync';
 btn.classList.remove('syncing');
}

async function seedDatabase() {
 showToast('Loading your wardrobe… this may take a moment');
 const rows = SEED_ITEMS.map(([name, image_url, location, category, sleeve]) => ({
   name, image_url, location, category, sleeve, notes: ''
 }));
 // Insert in batches of 50
 for (let i = 0; i < rows.length; i += 50) {
   await sbFetch('items', {
     method: 'POST',
     body: JSON.stringify(rows.slice(i, i + 50)),
     prefer: 'return=minimal'
   });
 }
 seeded = true;
 await loadFromSupabase();
}

async function saveToSupabase(item) {
 const row = {
   name: item.name, category: item.category, location: item.location,
   sleeve: item.sleeve, image_url: item.image || '', notes: item.notes || ''
 };
 if (item.id && item.id.includes('-')) {
   // update existing
   await sbFetch(`items?id=eq.${item.id}`, {
     method: 'PATCH', body: JSON.stringify(row), prefer: 'return=minimal'
   });
 } else {
   // insert new
   const res = await sbFetch('items', { method: 'POST', body: JSON.stringify(row) });
   if (res && res[0]) item.id = res[0].id;
 }
 return item;
}

async function moveInSupabase(id, newLocation) {
 await sbFetch(`items?id=eq.${id}`, {
   method: 'PATCH',
   body: JSON.stringify({ location: newLocation }),
   prefer: 'return=minimal'
 });
}

async function deleteFromSupabase(id) {
 await sbFetch(`items?id=eq.${id}`, { method: 'DELETE', prefer: 'return=minimal' });
}

// ── RENDER ───────────────────────────────────────────────
function render() {
 const search = document.getElementById('searchInput').value.toLowerCase();
 const filtered = items.filter(item => {
   const matchLoc = activeLoc === 'All' || item.location === activeLoc;
   const matchCat = activeCat === 'All' || item.category === activeCat;
   const matchSleeve = activeSleeve === 'All' || item.sleeve === activeSleeve;
   const matchSearch = !search || item.name.toLowerCase().includes(search) || item.category.toLowerCase().includes(search);
   return matchLoc && matchCat && matchSleeve && matchSearch;
 });

 document.getElementById('totalCount').textContent = items.length;

 // Location cards
 const locHTML = LOCATIONS.map(loc => {
   const s = LOC_STYLES[loc];
   const count = items.filter(i => i.location === loc).length;
   const pct = items.length ? (count / items.length) * 100 : 0;
   const active = activeLoc === loc;
   return `<button class="loc-card${active?' active':''}" 
     style="--loc-color:${s.dot};--loc-bg:${s.bg};--loc-text:${s.text}"
     onclick="toggleLoc('${loc}')">
     <div style="display:flex;justify-content:space-between;align-items:center">
       <span class="loc-name">${loc}</span>
       <span class="loc-count">${count}</span>
     </div>
     <div class="loc-bar-track"><div class="loc-bar-fill" style="width:${pct}%"></div></div>
   </button>`;
 }).join('');
 document.getElementById('locCards').innerHTML = locHTML;

 // Category filters
 const cats = ['All', ...CATEGORIES];
 const catHTML = cats.map(cat => {
   const icon = cat !== 'All' ? (CAT_ICONS[cat] || '') : '';
   return `<button class="filter-pill${activeCat===cat?' active':''}" onclick="toggleCat('${cat}')">${icon ? icon+' ' : ''}${cat}</button>`;
 }).join('');
 const sleeveHTML = `<div class="sleeve-toggle">
   ${['All','Short','Long'].map(s => `<button class="sleeve-btn${activeSleeve===s?' active':''}" onclick="toggleSleeve('${s}')">${s}</button>`).join('')}
 </div>`;
 document.getElementById('catFilters').innerHTML = catHTML + sleeveHTML;

 // Results bar
 const hasFilter = activeLoc !== 'All' || activeCat !== 'All' || activeSleeve !== 'All' || search;
 document.getElementById('resultsBar').innerHTML = hasFilter
   ? `Showing ${filtered.length} of ${items.length} items <button class="clear-btn" onclick="clearFilters()">Clear filters</button>`
   : `${items.length} items total`;

 // Grid
 if (items.length === 0) {
   document.getElementById('gridContainer').innerHTML = `<div class="loading"><div class="spinner"></div><p>Loading your wardrobe…</p></div>`;
   return;
 }
 if (filtered.length === 0) {
   document.getElementById('gridContainer').innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">No items found</div><p>Try a different filter</p></div>`;
   return;
 }

 const gridHTML = `<div class="grid">${filtered.map(item => cardHTML(item)).join('')}</div>`;
 document.getElementById('gridContainer').innerHTML = gridHTML;
}

function cardHTML(item) {
 const s = LOC_STYLES[item.location] || LOC_STYLES['Aspen'];
 const icon = CAT_ICONS[item.category] || '👔';
 const imgHTML = item.image
   ? `<img src="${item.image}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" loading="lazy"><span class="placeholder" style="display:none">${icon}</span>`
   : `<span class="placeholder">${icon}</span>`;
 const sleeveHTML = item.sleeve ? `<span class="card-sleeve">${item.sleeve} sleeve</span><br>` : '';
 const otherLocs = LOCATIONS.filter(l => l !== item.location);
 const menuHTML = `<div class="move-menu" id="menu-${item.id}" style="display:none">
   ${otherLocs.map(loc => {
     const ls = LOC_STYLES[loc];
     return `<button class="move-option" onclick="moveItem('${item.id}','${loc}')">
       <span style="width:8px;height:8px;border-radius:50%;background:${ls.dot};display:inline-block"></span>${loc}
     </button>`;
   }).join('')}
 </div>`;

 return `<div class="card">
   <div class="card-img">${imgHTML}</div>
   <div class="card-body">
     <div class="card-name">${item.name}</div>
     <div class="card-cat">${icon} ${item.category}</div>
     ${sleeveHTML}
     <span class="loc-badge" style="background:${s.bg};color:${s.text};border-color:${s.border}">
       <span class="loc-dot" style="background:${s.dot}"></span>${item.location}
     </span>
     <div class="card-actions">
       <button class="move-btn" onclick="toggleMenu('${item.id}',event)">Move ▾${menuHTML}</button>
       <button class="edit-btn" onclick="openModal('${item.id}')">Edit</button>
     </div>
   </div>
 </div>`;
}

// ── INTERACTIONS ────────────────────────────────────────
function toggleLoc(loc) { activeLoc = activeLoc === loc ? 'All' : loc; render(); }
function toggleCat(cat) { activeCat = cat; render(); }
function toggleSleeve(s) { activeSleeve = s; render(); }
function clearFilters() { activeLoc = 'All'; activeCat = 'All'; activeSleeve = 'All'; document.getElementById('searchInput').value = ''; render(); }

function toggleMenu(id, e) {
 e.stopPropagation();
 const menu = document.getElementById(`menu-${id}`);
 if (!menu) return;
 const isOpen = menu.style.display === 'block';
 // close all menus
 document.querySelectorAll('.move-menu').forEach(m => m.style.display = 'none');
 if (!isOpen) { menu.style.display = 'block'; openMenuId = id; }
 else openMenuId = null;
}

document.addEventListener('click', () => {
 document.querySelectorAll('.move-menu').forEach(m => m.style.display = 'none');
 openMenuId = null;
});

async function moveItem(id, newLoc) {
 const item = items.find(i => i.id === id);
 if (!item) return;
 item.location = newLoc;
 render();
 try { await moveInSupabase(id, newLoc); showToast(`Moved to ${newLoc}`); }
 catch(e) { showToast('Error saving move'); console.error(e); }
}

// ── MODAL ───────────────────────────────────────────────
function openModal(idOrNull) {
 const sel = document.getElementById('fCategory');
 sel.innerHTML = CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join('');
 const locSel = document.getElementById('fLocation');
 locSel.innerHTML = LOCATIONS.map(l => `<option value="${l}">${l}</option>`).join('');

 if (idOrNull) {
   editingItem = items.find(i => i.id === idOrNull);
   document.getElementById('modalTitle').textContent = 'Edit Item';
   document.getElementById('fName').value = editingItem.name;
   sel.value = editingItem.category;
   locSel.value = editingItem.location;
   document.getElementById('fSleeve').value = editingItem.sleeve || '';
   document.getElementById('fNotes').value = editingItem.notes || '';
   editingImage = editingItem.image || null;
   if (editingImage) {
     document.getElementById('imgPreview').src = editingImage;
     document.getElementById('imgPreview').style.display = 'block';
     document.getElementById('imgLabel').style.display = 'none';
     document.getElementById('imgClear').style.display = 'flex';
   } else {
     document.getElementById('imgPreview').style.display = 'none';
     document.getElementById('imgLabel').style.display = 'block';
     document.getElementById('imgClear').style.display = 'none';
   }
 } else {
   editingItem = null;
   document.getElementById('modalTitle').textContent = 'Add Item';
   document.getElementById('fName').value = '';
   sel.value = CATEGORIES[0];
   locSel.value = activeLoc !== 'All' ? activeLoc : 'Aspen';
   document.getElementById('fSleeve').value = '';
   document.getElementById('fNotes').value = '';
   editingImage = null;
   document.getElementById('imgPreview').style.display = 'none';
   document.getElementById('imgLabel').style.display = 'block';
   document.getElementById('imgClear').style.display = 'none';
 }
 document.getElementById('modalOverlay').style.display = 'flex';
}

function closeModal() {
 document.getElementById('modalOverlay').style.display = 'none';
 editingItem = null;
 editingImage = null;
}

function handleImageUpload(e) {
 const file = e.target.files[0];
 if (!file) return;
 const reader = new FileReader();
 reader.onload = ev => {
   editingImage = ev.target.result;
   document.getElementById('imgPreview').src = editingImage;
   document.getElementById('imgPreview').style.display = 'block';
   document.getElementById('imgLabel').style.display = 'none';
   document.getElementById('imgClear').style.display = 'flex';
 };
 reader.readAsDataURL(file);
}

function clearImage() {
 editingImage = null;
 document.getElementById('imgPreview').style.display = 'none';
 document.getElementById('imgLabel').style.display = 'block';
 document.getElementById('imgClear').style.display = 'none';
 document.getElementById('imgFileInput').value = '';
}

async function saveItem() {
 const name = document.getElementById('fName').value.trim();
 if (!name) return;
 const btn = document.getElementById('saveBtn');
 btn.disabled = true;
 btn.textContent = 'Saving…';

 const item = {
   id: editingItem ? editingItem.id : ('new-' + Date.now()),
   name,
   category: document.getElementById('fCategory').value,
   location: document.getElementById('fLocation').value,
   sleeve: document.getElementById('fSleeve').value,
   notes: document.getElementById('fNotes').value,
   image: editingImage
 };

 try {
   const saved = await saveToSupabase(item);
   if (editingItem) {
     const idx = items.findIndex(i => i.id === editingItem.id);
     if (idx >= 0) items[idx] = { ...saved };
   } else {
     items.push(saved);
   }
   render();
   closeModal();
   showToast(editingItem ? 'Item updated' : 'Item added');
 } catch(e) {
   showToast('Error saving item');
   console.error(e);
 }
 btn.disabled = false;
 btn.textContent = 'Save';
}

// ── TOAST ───────────────────────────────────────────────
function showToast(msg) {
 const t = document.getElementById('toast');
 t.textContent = msg;
 t.classList.add('show');
 setTimeout(() => t.classList.remove('show'), 2500);
}

// ── INIT ────────────────────────────────────────────────
render();
loadFromSupabase();
</script>
