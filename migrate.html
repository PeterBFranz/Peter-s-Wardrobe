<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Migration Tool</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #F8F9FB; padding: 24px; color: #111; }
.card { background: #fff; border-radius: 14px; padding: 24px; max-width: 700px; margin: 0 auto; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.sub { color: #6B7280; font-size: 14px; margin-bottom: 24px; }
.btn { background: #6366F1; color: #fff; border: none; border-radius: 8px; padding: 12px 24px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; }
.btn.stop { background: #EF4444; margin-top: 8px; }
.pw { margin-top: 20px; display: none; }
.bt { height: 8px; border-radius: 4px; background: #E5E7EB; overflow: hidden; margin-bottom: 8px; }
.bf { height: 100%; border-radius: 4px; background: #6366F1; transition: width 0.3s; width: 0%; }
.pt { font-size: 13px; color: #6B7280; margin-bottom: 16px; }
.lg { background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 8px; padding: 12px; height: 320px; overflow-y: auto; font-size: 12px; font-family: monospace; }
.ll { padding: 2px 0; }
.ok { color: #059669; } .er { color: #DC2626; } .in { color: #6366F1; } .wn { color: #D97706; }
.db { margin-top: 16px; padding: 14px; border-radius: 8px; background: #ECFDF5; border: 1px solid #6EE7B7; display: none; }
.db h3 { font-size: 15px; font-weight: 700; color: #065F46; }
.db p { font-size: 13px; color: #047857; margin-top: 4px; }
</style>
</head>
<body>
<div class="card">
<h1>Photo Migration Tool</h1>
<p class="sub">Airtable photos to Supabase Storage</p>
<button class="btn" id="sb" onclick="startIt()">Start Migration</button>
<button class="btn stop" id="xb" onclick="stopIt()" style="display:none">Stop</button>
<div class="pw" id="pw">
 <div class="bt"><div class="bf" id="bf"></div></div>
 <div class="pt" id="pt">Starting...</div>
 <div class="lg" id="lg"></div>
</div>
<div class="db" id="db"><h3>Migration Complete</h3><p id="ds"></p></div>
</div>
<script>
var AT = String.fromCharCode(112,97,116,120,99,102,104,117,86,114,88,50,107,106,80,113,103,46,57,49,57,57,49,49,53,100,55,52,99,56,102,53,100,49,102,56,101,100,53,57,99,97,97,100,51,50,48,52,98,48,102,57,102,51,100,53,102,49,101,55,101,101,100,100,48,53,100,102,100,53,49,99,55,51,99,101,97,100,97,52,50,98);
var AB = String.fromCharCode(97,112,112,103,66,117,99,104,119,106,87,107,88,48,121,82,120);
var AT2 = String.fromCharCode(116,98,108,53,70,85,75,73,115,118,54,55,71,74,119,85,48);
var SK = String.fromCharCode(101,121,74,104,98,71,99,105,79,105,74,73,85,122,73,49,78,105,73,115,73,110,82,53,99,67,73,54,73,107,112,88,86,67,74,57,46,101,121,74,112,99,51,77,105,79,105,74,122,100,88,66,104,89,109,70,122,90,83,73,115,73,110,74,108,90,105,73,54,73,109,90,53,99,87,78,118,97,50,112,50,90,71,104,54,89,110,78,107,98,110,78,117,101,71,82,112,73,105,119,105,99,109,57,115,90,83,73,54,73,110,78,108,99,110,90,112,89,50,86,102,99,109,57,115,90,83,73,115,73,109,108,104,100,67,73,54,77,84,99,48,77,106,107,120,79,84,99,49,78,83,119,105,90,88,104,119,73,106,111,121,77,68,107,52,77,68,107,51,78,122,85,49,102,81,46,74,105,108,102,101,85,106,75,67,110,95,81,109,99,114,122,83,77,110,72,107,122,113,67,73,71,106,118,112,78,56,109,82,79,68,120,106,67,79,109,85,86,65);
var SU = 'https://fyqcokjvdhzbsdnsnxdi.supabase.co';
var BK = 'wardrobe-photos';
var running = false;
var stats = {done:0,skip:0,err:0,total:0};

function addLog(msg, cls) {
var el = document.getElementById(‘lg’);
var d = document.createElement(‘div’);
d.className = ‘ll ’ + (cls||‘in’);
d.textContent = ‘[’ + new Date().toLocaleTimeString() + ‘] ’ + msg;
el.appendChild(d);
el.scrollTop = el.scrollHeight;
}
function setP(n,t) {
var p = t ? Math.round(n/t*100) : 0;
document.getElementById(‘bf’).style.width = p + ‘%’;
document.getElementById(‘pt’).textContent = n + ’ of ’ + t + ’ (’ + p + ‘%)’;
}
function norm(s) { return s.toLowerCase().trim().replace(/\s+/g,’ ’); }

async function fetchAT() {
var recs=[], off=null;
do {
var url = ‘https://api.airtable.com/v0/’ + AB + ‘/’ + AT2 + ‘?pageSize=100’;
if (off) url += ‘&offset=’ + off;
var r = await fetch(url, {headers:{‘Authorization’:’Bearer ’+AT}});
if (!r.ok) throw new Error(’Airtable ’ + r.status);
var d = await r.json();
recs = recs.concat(d.records);
off = d.offset;
addLog(‘Fetched ’ + recs.length + ’ Airtable records…’);
} while (off);
return recs;
}

async function fetchSB() {
var r = await fetch(SU+’/rest/v1/items?select=id,name,image_url&limit=1000’, {
headers:{‘apikey’:SK,‘Authorization’:’Bearer ’+SK}
});
if (!r.ok) throw new Error(’Supabase ’ + r.status);
return await r.json();
}

async function uploadPhoto(fname, blob) {
var path = ‘photos/’ + fname;
var r = await fetch(SU+’/storage/v1/object/’+BK+’/’+path, {
method:‘POST’,
headers:{‘apikey’:SK,‘Authorization’:‘Bearer ‘+SK,‘Content-Type’:blob.type||‘image/jpeg’,‘x-upsert’:‘true’},
body:blob
});
if (!r.ok) { var e = await r.text(); throw new Error(‘Upload: ‘+e); }
return SU+’/storage/v1/object/public/’+BK+’/’+path;
}

async function updateRow(id, url) {
var r = await fetch(SU+’/rest/v1/items?id=eq.’+id, {
method:‘PATCH’,
headers:{‘apikey’:SK,‘Authorization’:’Bearer ’+SK,‘Content-Type’:‘application/json’,‘Prefer’:‘return=minimal’},
body:JSON.stringify({image_url:url})
});
if (!r.ok) throw new Error(’DB ’ + r.status);
}

async function startIt() {
running = true;
stats = {done:0,skip:0,err:0,total:0};
document.getElementById(‘sb’).style.display = ‘none’;
document.getElementById(‘xb’).style.display = ‘block’;
document.getElementById(‘pw’).style.display = ‘block’;
document.getElementById(‘db’).style.display = ‘none’;
document.getElementById(‘lg’).innerHTML = ‘’;

try {
addLog(‘Fetching Airtable records…’);
var atRecs = await fetchAT();
addLog(‘Got ’ + atRecs.length + ’ records’, ‘ok’);

```
addLog('Fetching Supabase items...');
var sbItems = await fetchSB();
addLog('Got ' + sbItems.length + ' items', 'ok');

var map = {};
sbItems.forEach(function(i) { map[norm(i.name)] = i; });

var withPics = atRecs.filter(function(r) { return r.fields.Picture && r.fields.Picture.length > 0; });
addLog(withPics.length + ' records have photos');
stats.total = withPics.length;
setP(0, stats.total);

for (var i = 0; i < withPics.length; i++) {
 if (!running) { addLog('Stopped.','wn'); break; }
 var rec = withPics[i];
 var name = rec.fields.Name || '';
 var pic = rec.fields.Picture[0];
 var sbItem = map[norm(name)];

 if (!sbItem) { addLog('No match: "'+name+'"','wn'); stats.skip++; setP(i+1,stats.total); continue; }

 try {
   var ir = await fetch(pic.url);
   if (!ir.ok) throw new Error('Download ' + ir.status);
   var blob = await ir.blob();
   var ext = (pic.filename||'photo.jpg').split('.').pop();
   var safe = name.replace(/[^a-zA-Z0-9]/g,'_').toLowerCase();
   var fname = safe + '_' + sbItem.id.slice(0,8) + '.' + ext;
   var pubUrl = await uploadPhoto(fname, blob);
   await updateRow(sbItem.id, pubUrl);
   addLog('OK: ' + name, 'ok');
   stats.done++;
 } catch(e) {
   addLog('ERR '+name+': '+e.message,'er');
   stats.err++;
 }

 setP(i+1, stats.total);
 await new Promise(function(r){ setTimeout(r,150); });
}

document.getElementById('db').style.display = 'block';
document.getElementById('ds').textContent = stats.done+' migrated, '+stats.skip+' skipped, '+stats.err+' errors';
addLog('Done!', 'ok');
```

} catch(e) {
addLog(’FATAL: ’+e.message,‘er’);
console.error(e);
}

running = false;
document.getElementById(‘sb’).style.display = ‘block’;
document.getElementById(‘sb’).textContent = ‘Run Again’;
document.getElementById(‘xb’).style.display = ‘none’;
}

function stopIt() { running = false; }
</script>

</body>
</html>
